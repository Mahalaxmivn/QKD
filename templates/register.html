<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <title>Qmail</title>
  <!-- MDB icon -->
  <link rel="icon" href="img/mdb-favicon.ico" type="image/x-icon" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/all.css" />
  <!-- Google Fonts Roboto -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" />
  <!-- MDB -->
  <link rel="stylesheet" href="../static/css/bootstrap-login-form.min.css" />
</head>

<body>
  <!-- Start your project here-->
  <section class="vh-100" style="background-color: #110d0e;">
    <div class="container py-5 h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col col-xl-10">
          <div class="card" style="border-radius: 1rem;">
            <div class="row g-0">
              <div class="col-md-6 col-lg-5 d-none d-md-block">
                <img
                  src="https://www.nttdata.com/global/en/-/media/nttdataglobal/1_images/insights/focus/key-management-issues-in-cloud-and-the-introduction-of-post-quantum-cryptography/kv.jpg?h=1280&iar=0&w=2732&rev=5d26c3abb38947dea9953dea0344e7de"
                  alt="login form"
                  class="img-fluid" style="border-radius: 1rem 0 0 1rem; height: 100%; object-fit: cover;"
                />
              </div>
              <div class="col-md-6 col-lg-7 d-flex align-items-center">
                <div class="card-body p-4 p-lg-5 text-black">
  
                  {% if message %}
                            <p>{{ message }}</p>
                        {% endif %}
                            <form  action="/register" method="post">
  
                    <div class="d-flex align-items-center mb-3 pb-1">
                      <i class="fas fa-cubes fa-2x me-3" style="color: #ff6219;"></i>
                      <span class="h1 fw-bold mb-0">Qmail</span>
                    </div>
  
                    <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">Sign up your account</h5>
                    
                    <div class="form-outline mb-4">
                        <input type="text" id="form2Example17"  name="username" class="form-control form-control-lg" />
                        <label class="form-label" for="form2Example17">UserName</label>
                    </div>
                    <div class="form-outline mb-4">
                      <input type="email" name="email" id="form2Example17" class="form-control form-control-lg" />
                      <label class="form-label" for="form2Example17">Email address</label>
                    </div>
  
                    <div class="form-outline mb-4">
                      <input type="password" name="password" id="form2Example27" class="form-control form-control-lg" />
                      <label class="form-label" for="form2Example27">Password</label>
                    </div>
                    <div class="form-outline mb-4">
                        
                      <input type="date"  name = "birthday" id="form2Example17" class="form-control form-control-lg" />
                      <label class="form-label" for="form2Example17">Birthday</label>
                    </div>

                      <div class="form-outline mb-4">
                        
                        <select id="form2Example17" name="gender" class="form-control form-control-lg">
                          <option value="" disabled selected>Select Gender</option>
                          <option value="male">Male</option>
                          <option value="female">Female</option>
                          <option value="other">Other</option>
                        </select>
                        
                      </div>
                      
                     
                    <div class="pt-1 mb-4">
                      <button class="btn btn-dark btn-lg btn-block" type="submit">Account Creation</button>
                    </div>
                  </form>

                    <p class="mb-5 pb-lg-2" style="color: #393f81;">You have an account? <a href="{{url_for('signin')}}" style="color: #393f81;">Signin here</a></p>
                   
                  
  
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- End your project here-->

  <!-- MDB -->
  <script type="text/javascript" src="../static/js/mdb.min.js"></script>
  <!-- Custom scripts -->
  <script type="text/javascript"></script>
</body>

</html>
