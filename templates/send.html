   <title>Qmail</title>

    <!-- <link rel="manifest" href="site.webmanifest"> -->
    <link rel="shortcut icon" type="image/x-icon" href="../static/app/img/favicon.png">
    <!-- Place favicon.ico in the root directory -->

    <!-- CSS here -->
    <link rel="stylesheet" href="../static/app/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/app/css/owl.carousel.min.css">
    <link rel="stylesheet" href="../static/app/css/magnific-popup.css">
    <link rel="stylesheet" href="../static/app/css/font-awesome.min.css">

<body>
    <!--[if lte IE 9]>
            <p class="browserupgrade">You are using an <strong>outdated</strong> browser. Please <a href="https://browsehappy.com/">upgrade your browser</a> to improve your experience and security.</p>
        <![endif]-->


    <!-- header-start -->
    <header>
        <div class="header-area ">
            <div class="header-top_area">
                <div class="container">
                    <div class="row">
                        <div class="col-xl-6 col-md-6 ">
                            <div class="social_media_links">
                                <a href="#">
                                    <i class="fa fa-linkedin"></i>
                                </a>
                                <a href="#">
                                    <i class="fa fa-facebook"></i>
                                </a>
                                <a href="#">
                                    <i class="fa fa-google-plus"></i>
                                </a>
                            </div>
                        </div>
                        <div class="col-xl-6 col-md-6">
                            <div class="short_contact_list">
                                <ul>
                                    <li><a href="#"> <i class="fa fa-envelope"></i> info@Qmail.com</a></li>
                                    <li><a href="#"> <i class="fa fa-phone"></i> 9012345678</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="sticky-header" class="main-header-area">
                <div class="container">
                    <div class="row align-items-center">
                        <div class="col-xl-3 col-lg-2">
                            <div class="logo">
                                <a href="index.html">
                                    Qmail
                                </a>
                            </div>
                        </div>
                        <div class="col-xl-9 col-lg-7">
                            <div class="main-menu  d-none d-lg-block">
                                <nav>
                                    <ul id="navigation">
                                        <li><a class="active" href="{{url_for('inbox')}}">Inbox</a></li>
                                     

                                        <li><a  href="{{url_for('send')}}">Send</a></li>
                                        <li><a  href="{{url_for('emailcomposed')}}">Email Composed</a></li>
                                        
                                        <li><a  href="{{url_for('index')}}">Logout({{name}})</a></li>
                                    
                                      
                                     
                                    </ul>
                                </nav>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="mobile_menu d-block d-lg-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>


    <section class="contact-section">
            <div class="container">
           
                <div class="row">
                    <div class="col-12">
                        <h2 class="contact-title">Inbox</h2>
            
                        <table class="table table-bordered mt-3">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Receiver Mail Id</th>
                                    <th>Subject</th>
                                    <th>View Content</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for message in messages %}
                                <tr>
                                    <td>{{ message.date }}</td>
                                    <td>{{ message.from  }}</td>
                                    <td>{{ message.content  }}</td>
                                    
                                    <td><a class="button button-contactForm boxed-btn" href="/decrypt?id={{ message.fileid }}&fileid={{message.keyid}}">Message Decrypt</a></td>

                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                  
                    </div>
                 
                </div>
            </div>
        </section>
    <!-- ================ contact section end ================= -->
    

        <!-- JS here -->
        <script src="../static/app/js/vendor/modernizr-3.5.0.min.js"></script>

        <script src="../static/app/js/bootstrap.min.js"></script>

        <script src="../static/app/js/scrollIt.js"></script>
        <script src="../static/app/js/jquery.scrollUp.min.js"></script>
        <script src="../static/app/js/wow.min.js"></script>
        <script src="../static/app/js/nice-select.min.js"></script>
        <script src="../static/app/js/jquery.slicknav.min.js"></script>
        <script src="../static/app/js/jquery.magnific-popup.min.js"></script>
        <script src="../static/app/js/plugins.js"></script>
        <script src="../static/app/js/gijgo.min.js"></script>
    
        <!--contact js-->
        <script src="../static/app/js/contact.js"></script>
        <script src="../static/app/js/jquery.ajaxchimp.min.js"></script>
        <script src="../static/app/js/jquery.form.js"></script>
        <script src="../static/app/js/jquery.validate.min.js"></script>
        <script src="../static/app/js/mail-script.js"></script>
    
        <script src="../static/app/js/main.js"></script>
        <script>
            $('#datepicker').datepicker({
                iconsLibrary: 'fontawesome',

             }
            });
            $('#datepicker2').datepicker({
                iconsLibrary: 'fontawesome',
                icons: {
                 rightIcon: '<span class="fa fa-caret-down"></span>'
             }
    
            });
        </script>
    </body>
    
    </html>
