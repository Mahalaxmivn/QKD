<body>

    <!-- header-start -->
    <header>
        <div class="header-area ">
            <div class="header-top_area">
                <div class="container">
                    <div class="row">
                        <div class="col-xl-6 col-md-6 ">
                            <div class="social_media_links">
                                <a href="#">
                                    <i class="fa fa-linkedin"></i>
                                </a>
                                <a href="#">
                                    <i class="fa fa-facebook"></i>
                                </a>
                                <a href="#">
                                    <i class="fa fa-google-plus"></i>
                                </a>
                            </div>
                        </div>
                        <div class="col-xl-6 col-md-6">
                            <div class="short_contact_list">
                                <ul>
                                    <li><a href="#"> <i class="fa fa-envelope"></i> info@Qmail.com</a></li>
                                    <li><a href="#"> <i class="fa fa-phone"></i> 9012345678</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="sticky-header" class="main-header-area">
                <div class="container">
                    <div class="row align-items-center">
                        <div class="col-xl-3 col-lg-2">
                            <div class="logo">
                                <a href="index.html">
                                    Qmail
                                </a>
                            </div>
                        </div>
                        <div class="col-xl-9 col-lg-7">
                            <div class="main-menu  d-none d-lg-block">
                                <nav>
                                    <ul id="navigation">
                                        <li><a class="active" href="{{url_for('inbox')}}">Inbox</a></li>
                                     

                                        <li><a  href="{{url_for('send')}}">Send</a></li>
                                        <li><a  href="{{url_for('emailcomposed')}}">Email Composed</a></li>
                                        
                                        <li><a  href="{{url_for('index')}}">Logout({{name}})</a></li>
                                    
                                    </ul>
                                </nav>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="mobile_menu d-block d-lg-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- header-end -->

    <!-- bradcam_area_start  -->
 

    <section class="contact-section">
            <div class="container">
           
                <div class="row">
                    <div class="col-12">
                        <h2 class="contact-title">Send Mail Message</h2>
                        {% if message %}
                        <p style="color: white;">{{ message }}</p>
                    {% endif %}
                    </div>
                    <div class="col-lg-12">
                        <form  class="form-contact contact_form"  action="/emailcompose" method="post">
                               <div class="row">
                                <div class="col-12">
                                    <div class="form-group">
                                        <input class="form-control" name="toemail" id="toemail" type="email" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Receiver MailId'" placeholder="Enter Receiver EmailId">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-group">
                                        <input class="form-control valid" name="subject"  id="subject" type="text" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter Subject'" placeholder="Enter Subject">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-group">
                                        <textarea class="form-control w-100" name="message" id="message" cols="30" rows="9" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter message'" placeholder=" message"></textarea>
                                    </div>
                                </div>
                              
                               
                            </div>
                            <div class="form-group mt-3">
                                <button type="submit" class="button button-contactForm boxed-btn">Send</button>
                            </div>
                        </form>
                    </div>
                
                </div>
            </div>
        </section>
    <!-- ================ contact section end ================= -->
    

<!-- form itself end -->

    </body>
